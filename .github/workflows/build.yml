name: Build

on:
  release:
    types: [ published ]

jobs:
  build:
    name: PlatformIO build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e heltec-v4-tft

      - name: Collect artifacts
        run: |
          TAG=${{ github.event.release.tag_name }}
          mkdir -p dist
          cp .pio/build/heltec-v4-tft/firmware.bin dist/daisy-aprs-${TAG}.bin
          cp .pio/build/heltec-v4-tft/firmware.elf dist/daisy-aprs-${TAG}.elf
          cp .pio/build/heltec-v4-tft/firmware.map dist/daisy-aprs-${TAG}.map 2>/dev/null || true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/*.bin
            dist/*.elf
            dist/*.map